alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
      routes:
        - matchers:
            - alertname =~ "InfoInhibitor|Watchdog"
          receiver: 'null'
    receivers:
      - name: 'null'
    templates: []

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    additionalScrapeConfigs:
      - job_name: "otel-agent-api"
        static_configs:
          - targets: ["host.docker.internal:8000"]
        metrics_path: /metrics

      - job_name: "mcp-add-sub-server"
        static_configs:
          - targets: ["host.docker.internal:8001"]
        metrics_path: /metrics

      - job_name: "mcp-mul-div-server"
        static_configs:
          - targets: ["host.docker.internal:8002"]
        metrics_path: /metrics

grafana:
  enabled: false   # we deploy Grafana separately

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: true
