# wd-otel config for the multi-step solver MCP server process.
service:
  name: "otel-agent-v2-mcp-mul-div"
  version: "1.0.0"
  env: "local"

traces:
  endpoint: "localhost:4317"
  protocol: "grpc"
  filter_libraries:
    - "fastmcp"

metrics:
  prometheus_port: 8002

logs:
  loki_url: "http://localhost:3100/loki/api/v1/push"
